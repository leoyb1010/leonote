name: Auto Deploy on Push

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: [self-hosted, macOS, leonote]
    steps:
      - name: Pull latest code
        run: |
          cd /Users/leo/leonote
          # 先直连 GitHub；失败再走 ClashX 代理（本机直连 github 时通时不通）
          git -c credential.helper='store --file /Users/leo/.git-credentials-leonote' pull origin main \
            || { export HTTPS_PROXY=http://127.0.0.1:7890 HTTP_PROXY=http://127.0.0.1:7890 NO_PROXY=localhost,127.0.0.1; \
                 git -c credential.helper='store --file /Users/leo/.git-credentials-leonote' pull origin main; }
      - name: Install dependencies
        run: |
          cd /Users/leo/leonote
          npm ci \
            || { export HTTPS_PROXY=http://127.0.0.1:7890 HTTP_PROXY=http://127.0.0.1:7890 NO_PROXY=localhost,127.0.0.1; \
                 npm ci; }
      - name: Run database migrations
        run: |
          cd /Users/leo/leonote
          export DATABASE_URL="file:/Users/leo/leonote/prisma/data/leonote.db"
          npx prisma migrate deploy
      - name: Build
        run: |
          cd /Users/leo/leonote
          npx prisma generate
          npm run build
      - name: Restart PM2
        run: |
          cd /Users/leo/leonote
          pm2 restart leonote --update-env
