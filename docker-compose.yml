services:
  leonote:
    build: .
    container_name: leonote
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 4317
      DATABASE_URL: file:/app/data/leonote.db
      RUST_LOG: info
    # 生产环境建议绑定 127.0.0.1，通过 Nginx/Caddy 反代提供 HTTPS
    ports:
      - "127.0.0.1:4317:4317"
    volumes:
      - leonote-data:/app/data

  briefing-cron:
    build: .
    container_name: leonote-briefing-cron
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      DATABASE_URL: file:/app/data/leonote.db
      LEONOTE_INTERNAL_URL: http://leonote:4317
    command: ["npm", "run", "briefing:cron"]
    depends_on:
      - leonote
    volumes:
      - leonote-data:/app/data

volumes:
  leonote-data:
