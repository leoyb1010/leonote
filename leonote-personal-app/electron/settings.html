<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Leonote 服务器设置</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #06070a;
        --panel: rgba(16, 19, 26, 0.86);
        --border: rgba(255, 255, 255, 0.1);
        --text: #f4f7fb;
        --soft: rgba(244, 247, 251, 0.68);
        --faint: rgba(244, 247, 251, 0.44);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
        background:
          radial-gradient(circle at top, rgba(99, 102, 241, 0.18), transparent 32%),
          radial-gradient(circle at 86% 18%, rgba(34, 211, 238, 0.12), transparent 24%),
          linear-gradient(180deg, #0b0d13 0%, var(--bg) 100%);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", sans-serif;
      }

      main {
        width: min(560px, 100%);
        border: 1px solid var(--border);
        border-radius: 28px;
        background: var(--panel);
        box-shadow: 0 24px 72px rgba(2, 6, 23, 0.36);
        padding: 28px;
      }

      p,
      h1 {
        margin: 0;
      }

      .eyebrow {
        color: var(--faint);
        font-size: 12px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
      }

      h1 {
        margin-top: 12px;
        font-size: 28px;
        line-height: 1.2;
      }

      .copy {
        margin-top: 12px;
        color: var(--soft);
        font-size: 14px;
        line-height: 1.8;
      }

      label {
        display: block;
        margin-top: 24px;
        color: var(--soft);
        font-size: 13px;
      }

      input {
        width: 100%;
        margin-top: 10px;
        border: 1px solid var(--border);
        border-radius: 18px;
        background: rgba(8, 11, 18, 0.72);
        color: var(--text);
        font: inherit;
        outline: none;
        padding: 15px 16px;
      }

      input:focus {
        border-color: rgba(99, 102, 241, 0.72);
        box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.14);
      }

      button {
        margin-top: 16px;
        width: 100%;
        border: 0;
        border-radius: 999px;
        background: white;
        color: #0f172a;
        cursor: pointer;
        font: inherit;
        font-weight: 650;
        padding: 14px 16px;
      }

      .hint,
      .error,
      .path {
        margin-top: 14px;
        border-radius: 16px;
        padding: 12px 14px;
        font-size: 12px;
        line-height: 1.7;
      }

      .hint,
      .path {
        background: rgba(255, 255, 255, 0.05);
        color: var(--soft);
      }

      .error {
        display: none;
        border: 1px solid rgba(251, 113, 133, 0.28);
        background: rgba(251, 113, 133, 0.1);
        color: #fecdd3;
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }

      .chip {
        width: auto;
        margin: 0;
        border: 1px solid var(--border);
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        padding: 8px 10px;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Leonote Remote</p>
      <h1>设置服务器地址</h1>
      <p class="copy">这台 Mac App 会连接同一个 Leonote 服务。Mac mini、MacBook 和 iPhone 只要使用同一个地址，就会共用一份服务器数据库。</p>

      <div id="error" class="error"></div>

      <label for="serverUrl">Leonote 服务器 URL</label>
      <input id="serverUrl" placeholder="https://notes.example.com" autocomplete="off" />
      <button id="save" type="button">保存并打开</button>

      <div class="hint">
        临时局域网测试可以用 http://Mac-mini-局域网-IP:4317。正式使用建议换成 HTTPS 域名。
        <div id="suggestions" class="chips"></div>
      </div>

      <div id="path" class="path"></div>
    </main>

    <script>
      const input = document.getElementById("serverUrl");
      const error = document.getElementById("error");
      const pathNode = document.getElementById("path");
      const suggestions = document.getElementById("suggestions");

      function showError(message) {
        error.textContent = message || "";
        error.style.display = message ? "block" : "none";
      }

      async function boot() {
        const params = new URLSearchParams(location.search);
        showError(params.get("error") || "");

        const config = await window.leonoteRemote.getConfig();
        input.value = config.currentUrl || "";
        pathNode.textContent = `配置文件：${config.configPath}`;

        for (const url of config.lanSuggestions || []) {
          const button = document.createElement("button");
          button.type = "button";
          button.className = "chip";
          button.textContent = url;
          button.addEventListener("click", () => {
            input.value = url;
          });
          suggestions.appendChild(button);
        }
      }

      document.getElementById("save").addEventListener("click", async () => {
        showError("");
        try {
          await window.leonoteRemote.saveUrl(input.value);
        } catch (event) {
          showError(event && event.message ? event.message : String(event));
        }
      });

      input.addEventListener("keydown", (event) => {
        if (event.key === "Enter") {
          document.getElementById("save").click();
        }
      });

      boot();
    </script>
  </body>
</html>
